services:
  - type: web
    name: hems-backend
    env: python
    buildCommand: "cd BACKEND/hems_backend && pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate"
    startCommand: "cd BACKEND/hems_backend && gunicorn hems_backend.wsgi:application --bind 0.0.0.0:$PORT --workers 2"
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: hems-db
          property: connectionString
      - key: GROQ_API_KEY
        sync: false
  - type: psql
    name: hems-db
    plan: free