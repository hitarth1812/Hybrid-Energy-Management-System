services:
  - type: web
    name: hems-backend
    env: python
    pythonVersion: '3.12'
    buildCommand: "bash BACKEND/hems_backend/render-build.sh"
    startCommand: "python -m gunicorn --chdir BACKEND/hems_backend hems_backend.wsgi:application --bind 0.0.0.0:$PORT --workers 2"
    envVars:
      - key: PYTHONPATH
        value: /opt/render/project/src/BACKEND/hems_backend
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: hems-db
          property: connectionString
      - key: GROQ_API_KEY
        sync: false
databases:
  - name: hems-db
    plan: free